---
# Workflow that updates the install-openhands-website repository when a release is published
name: Update Install Website Version

# Trigger when a release is published (not draft) or manually
on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            version:
                description: Version number to update (e.g., 1.6.0)
                required: true
                type: string

permissions:
    contents: read

jobs:
    update-install-website:
        name: Update install-openhands-website version
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.draft }}

        steps:
            - name: Checkout current repository
              uses: actions/checkout@v4

            - name: Extract version from release tag or manual input
              id: extract_version
              env:
                  VERSION_INPUT: ${{ inputs.version }}
                  RELEASE_TAG: ${{ github.event.release.tag_name }}
              run: |
                  # Extract version from tag (remove 'v' prefix if present) or use manual input
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    VERSION="$VERSION_INPUT"
                    echo "Using manual input version: $VERSION"
                  else
                    VERSION="$RELEASE_TAG"
                    VERSION="${VERSION#v}"
                    echo "Extracted version from release tag: $VERSION"
                  fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Clone install-openhands-website repository
              run: |
                  # Use OPENHANDS_BOT_GITHUB_PAT_INSTALL_WEBSITE to clone the repository
                  git clone https://${{ secrets.OPENHANDS_BOT_GITHUB_PAT_INSTALL_WEBSITE }}@github.com/OpenHands/install-openhands-website.git website-repo
                  cd website-repo
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Create branch and update version
              env:
                  VERSION: ${{ steps.extract_version.outputs.version }}
              run: |
                  cd website-repo
                  BRANCH_NAME="update-version-$VERSION"
                  git checkout -b "$BRANCH_NAME"

                  # Update the VERSION line in install.sh
                  sed -i 's/^VERSION=".*"$/VERSION="'"$VERSION"'"/' public/install.sh

                  # Verify the change was made
                  echo "Updated VERSION line:"
                  grep "VERSION=" public/install.sh

                  # Check if there are changes to commit
                  if git diff --quiet; then
                    echo "No changes detected. Version might already be up to date."
                    echo "has_changes=false" >> $GITHUB_ENV
                  else
                    echo "Changes detected. Proceeding with commit and PR."
                    echo "has_changes=true" >> $GITHUB_ENV
                    git add public/install.sh
                    git commit -m "Update OpenHands CLI version to $VERSION" \
                               -m "This update corresponds to the release of OpenHands CLI v$VERSION." \
                               -m "Automated update triggered by release workflow."
                    git push origin "$BRANCH_NAME"
                  fi

            - name: Check for existing PR
              if: env.has_changes == 'true'
              env:
                  VERSION: ${{ steps.extract_version.outputs.version }}
              run: |
                  # Check if a PR already exists for this version
                  EXISTING_PR=$(curl -s \
                    -H "Authorization: token ${{ secrets.OPENHANDS_BOT_GITHUB_PAT_INSTALL_WEBSITE }}" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/repos/OpenHands/install-openhands-website/pulls?state=open&head=update-version-$VERSION" \
                    | jq -r '.[0].html_url // "null"')

                  if [ "$EXISTING_PR" != "null" ]; then
                    echo "PR already exists for version $VERSION: $EXISTING_PR"
                    echo "pr_exists=true" >> $GITHUB_ENV
                    echo "existing_pr_url=$EXISTING_PR" >> $GITHUB_ENV
                  else
                    echo "No existing PR found for version $VERSION"
                    echo "pr_exists=false" >> $GITHUB_ENV
                  fi

            - name: Create Pull Request
              if: env.has_changes == 'true' && env.pr_exists == 'false'
              env:
                  VERSION: ${{ steps.extract_version.outputs.version }}
                  RELEASE_URL: ${{ github.event.release.html_url }}
              run: |
                  cd website-repo
                  BRANCH_NAME="update-version-$VERSION"

                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    CONTEXT="This update was manually triggered via workflow dispatch."
                  else
                    CONTEXT="This update was automatically triggered by the release of [OpenHands CLI v$VERSION]($RELEASE_URL) in the [OpenHands-CLI repository](https://github.com/OpenHands/OpenHands-CLI)."
                  fi
                  PR_BODY=$(cat <<EOF
                  This PR updates the OpenHands CLI version in the install script to v$VERSION.

                  **Changes:**
                  - Updated \`VERSION\` in \`public/install.sh\` from the previous version to \`$VERSION\`

                  **Context:**
                  $CONTEXT

                  **Testing:**
                  After merging, users will be able to install the latest version using:
                  \`\`\`bash
                  curl -fsSL https://install.openhands.dev/install.sh | sh
                  \`\`\`
                  EOF
                  )

                  # Create PR using GitHub API
                  jq -n \
                    --arg title "Update OpenHands CLI version to $VERSION" \
                    --arg head "$BRANCH_NAME" \
                    --arg body "$PR_BODY" \
                    '{title: $title, head: $head, base: "main", body: $body, draft: false}' \
                    | curl -X POST \
                      -H "Authorization: token ${{ secrets.OPENHANDS_BOT_GITHUB_PAT_INSTALL_WEBSITE }}" \
                      -H "Accept: application/vnd.github.v3+json" \
                      https://api.github.com/repos/OpenHands/install-openhands-website/pulls \
                      -d @- \
                    | jq -r '.html_url' > pr_url.txt

                  if [ -s pr_url.txt ] && [ "$(cat pr_url.txt)" != "null" ]; then
                    echo "✅ Pull request created successfully: $(cat pr_url.txt)"
                  else
                    echo "❌ Failed to create pull request"
                    exit 1
                  fi

            - name: Summary
              env:
                  VERSION: ${{ steps.extract_version.outputs.version }}
              run: |-
                  if [ "${{ env.has_changes }}" = "true" ]; then
                    if [ "${{ env.pr_exists }}" = "true" ]; then
                      echo "ℹ️ PR already exists for version $VERSION: ${{ env.existing_pr_url }}"
                    else
                      echo "✅ Successfully created PR to update install-openhands-website to version $VERSION"
                    fi
                  else
                    echo "ℹ️ No changes needed - version $VERSION is already up to date in install-openhands-website"
                  fi

